
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定跡解説の一覧 - KitsuneChess</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  .search-box-wrap {
  max-width: 600px;
  margin: 0 auto 24px auto;
  padding: 0 16px;
}
.search-box {
  width: 100%;
  padding: 10px 16px;
  border: 1px solid rgba(90, 58, 24, 0.25);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.6);
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  color: #4a2a0e;
  box-sizing: border-box;
}
.search-box:focus {
  outline: none;
  border-color: #7c4a1e;
  background: #fff;
}
.opening-card.search-hidden {
  display: none;
}
:root {
  --bg: #f5edd6; 
  --brown: #7c4a1e; 
  --brown-dark: #4a2a0e; 
  --brown-light: #a3692d;
  --text: #111; 
  --text-sub: #222;
  --nav-bg: rgba(90, 58, 24, 0.1);
  --border-color: rgba(184, 134, 11, 0.3);
  --card-bg: rgba(255, 255, 255, 0.5);
  --card-border: rgba(90, 58, 24, 0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-weight: 600;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  width: 100%;
  background: var(--nav-bg);
  border-bottom: 2px solid var(--border-color);
}

.nav-inner {
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
}

nav h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: 1px;
}

/* 日英切り替えトグルボタン */
.lang-switch-btn {
  background: rgba(90, 58, 24, 0.08);
  border: 1px solid rgba(90, 58, 24, 0.25);
  color: var(--text-sub);
  padding: 5px 10px;
  border-radius: 5px;
  font-family: 'Crimson Pro', serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.lang-switch-btn:hover {
  border-color: var(--brown);
  color: var(--brown);
  background: rgba(90, 58, 24, 0.15);
}

/* ── CONTENT AREA ── */
.app-container {
  max-width: 600px;
  margin: 0 auto;
  width: 100%;
  padding: 24px 16px;
}

.section-title {
  font-size: 1.3rem;
  color: var(--brown-dark);
  margin-top: 24px;
  margin-bottom: 14px;
  border-left: 4px solid var(--brown);
  padding-left: 8px;
}

/* ── OPENING ITEM CARD ── */
.opening-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(74, 42, 14, 0.03);
}

.opening-name {
  font-size: 1.25rem;
  color: var(--text-sub);
  font-weight: 700;
  margin-bottom: 16px;
}

/* ── BUTTONS ── */
.btn-group {
  display: flex;
  gap: 8px;
}

.action-btn {
  flex: 1;
  display: block;
  text-align: center;
  text-decoration: none;
  background: var(--brown);
  border: 1px solid var(--brown-dark);
  color: #fff;
  padding: 10px 12px;
  border-radius: 5px;
  font-size: 0.9rem;
  font-weight: 700;
  transition: all 0.2s;
  white-space: nowrap;
}

.action-btn:hover {
  background: var(--brown-dark);
}

/* ── 多言語切り替え用表示制御 ── */
.lang-element-ja, .lang-element-en {
  display: none;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  font-size: 0.85rem;
  color: var(--brown-light);
  margin-top: 40px;
  padding-bottom: 20px;
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <h1>KitsuneChess</h1>
    <!-- 右上の日英切り替えボタン（現在の言語に応じて文字が変わります） -->
    <button id="langToggle" class="lang-switch-btn">English</button>
  </div>
</nav>

<div class="app-container">

  <!-- ヘッダータイトル -->
  <div class="search-box-wrap">
  <input type="text" id="openingSearch" class="search-box" placeholder="定跡名で検索 / Search by name" oninput="filterOpenings(this.value)">
</div>
  <h2 class="section-title lang-element-ja">白のオープニング</h2>
  <h2 class="section-title lang-element-en">White Openings</h2>
  
  <!-- クイーンズ・ギャンビット -->
  <div class="opening-card">
    <div class="opening-name lang-element-ja">クイーンズ・ギャンビット</div>
    <div class="opening-name lang-element-en">Queen's Gambit</div>
    
  <div class="btn-group">
  <a href="queens_gambit.html?lang=ja" class="action-btn lang-element-ja">解説を見る</a>
  <a href="queens_gambit.html?lang=en" class="action-btn lang-element-en">View Guide</a>
</div>
  </div>

  <!-- ルイ・ロペス -->
  <div class="opening-card">
    <div class="opening-name lang-element-ja">ルイ・ロペス</div>
    <div class="opening-name lang-element-en">Ruy Lopez</div>
    
   <div class="btn-group">
  <a href="ruy_lopez.html?lang=ja" class="action-btn lang-element-ja">解説を見る</a>
  <a href="ruy_lopez.html?lang=en" class="action-btn lang-element-en">View Guide</a>
</div>
  </div>

  <!-- 黒のオープニング -->
  <h2 class="section-title lang-element-ja">黒のオープニング</h2>
<h2 class="section-title lang-element-en">Black Openings</h2>

<!-- シシリアン・ディフェンス -->
<div class="opening-card">
  <div class="opening-name lang-element-ja">シシリアン・ディフェンス</div>
  <div class="opening-name lang-element-en">Sicilian Defense</div>

  <div class="btn-group">
    <a href="sicilian.html?lang=ja" class="action-btn lang-element-ja">解説を見る</a>
    <a href="sicilian.html?lang=en" class="action-btn lang-element-en">View Guide</a>
  </div>
</div>

<!-- フレンチ・ディフェンス -->
<div class="opening-card">
  <div class="opening-name lang-element-ja">フレンチ・ディフェンス</div>
  <div class="opening-name lang-element-en">French Defense</div>

  <div class="btn-group">
    <a href="french.html?lang=ja" class="action-btn lang-element-ja">解説を見る</a>
    <a href="french.html?lang=en" class="action-btn lang-element-en">View Guide</a>
  </div>
</div>

<!-- カロ・カン・ディフェンス -->
<div class="opening-card">
  <div class="opening-name lang-element-ja">カロ・カン・ディフェンス</div>
  <div class="opening-name lang-element-en">Caro-Kann Defense</div>

  <div class="btn-group">
    <a href="caro_kann.html?lang=ja" class="action-btn lang-element-ja">解説を見る</a>
    <a href="caro_kann.html?lang=en" class="action-btn lang-element-en">View Guide</a>
  </div>
</div>

  <footer>
    © KitsuneChess
  </footer>
</div>

<script>

  function normalizeSearchText(s) {
  return s.toLowerCase().replace(/[・\-’'\s]/g, '');
}

function filterOpenings(query) {
  const q = normalizeSearchText(query);
  document.querySelectorAll('.opening-card').forEach(function(card) {
    const names = card.querySelectorAll('.opening-name');
    let text = '';
    names.forEach(function(n) { text += n.textContent + ' '; });
    const normalized = normalizeSearchText(text);
    if (q === '' || normalized.includes(q)) {
      card.classList.remove('search-hidden');
    } else {
      card.classList.add('search-hidden');
    }
  });
}
}let currentLang = 'ja';

function updateLanguageDisplay(lang) {
  currentLang = lang;
  // 選択された言語をブラウザに記憶させる
  localStorage.setItem('selectedLang', lang);
  
  if (lang === 'en') {
    document.querySelectorAll('.lang-element-en').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.lang-element-ja').forEach(el => el.style.display = 'none');
    document.getElementById('langToggle').textContent = '日本語';
  } else {
    document.querySelectorAll('.lang-element-ja').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.lang-element-en').forEach(el => el.style.display = 'none');
    document.getElementById('langToggle').textContent = 'English';
  }
}

document.addEventListener("DOMContentLoaded", function() {
  // 1. まずブラウザが覚えている言語（記憶）があるか確認する
  let lang = localStorage.getItem('selectedLang');
  
  // 2. 記憶がなければ、URLのパラメーターやブラウザの基本言語から判定する
  if (!lang) {
    const urlParams = new URLSearchParams(window.location.search);
    lang = urlParams.get('lang') || window.location.hash.replace('#', '');
  }
  
  if (!lang) {
    const userLang = navigator.language || navigator.userLanguage;
    lang = userLang.startsWith('ja') ? 'ja' : 'en';
  }

  // 判定された言語で表示
  updateLanguageDisplay(lang);

  // 3. 切り替えボタンが押された時の処理
  document.getElementById('langToggle').addEventListener('click', function() {
    if (currentLang === 'ja') {
      updateLanguageDisplay('en');
    } else {
      updateLanguageDisplay('ja');
    }
  });
});
</script>

</body>
</html>
